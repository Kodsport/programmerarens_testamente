<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data['name'] }} - {{ competitionName }}</title>
    <script src="{{ url_for('static', filename='prism.js') }}"></script>
    <style>
        @import url({{ url_for('static', filename='toolstyle.css') }}) layer(toolstyle);
        @import url({{ url_for('static', filename='prism.css') }}) layer(prism);

        form > div, #inputData, #highlighting {
            height: 90vh;
            width: 100%;
        }

        #inputData, #highlighting {
            margin: 0;
            padding: 0;
            border: 0;
        }
        #inputData, #highlighting, #highlighting * {
            font-size: 15pt;
            font-family: monospace;
            line-height: 1.5;
            tab-size: 2;
        }

        #inputData, #highlighting {
            position: relative;
            padding: 15px;
            box-sizing: border-box;
        }
        #highlighting {
            transform: translateY(-100%);
        }

        #inputData {
            z-index: 1;
        }
        #highlighting {
            z-index: 0;
        }

        #inputData {
            color: transparent;
            background: transparent;
            caret-color: white;
        }

        #inputData, #highlighting {
            overflow: auto;
            white-space: pre;
        }

        #inputData {
            resize: none;
        }

        p.text {
            white-space: pre-wrap;
            max-width: 100%;
        }

        section {
            margin: 1em 0;
        }

        section:has(> code) {
            padding-bottom: 15px;
        }

        section > code {
            padding: 15px;
            background: #1F1F1F;
            border-radius: .5em;
            box-shadow: 1px 1px .5em #000 inset;
        }
    </style>
</head>

<body>
    <h1>{{ data['name'] }}</h1>
    <p class="text">{{ data['description'] }}</p>

    <section>
        <h2>Input</h2>
        <code>{{ input }}</code>
    </section>
    <section>
        <h2>Output</h2>
        <code>{{ output }}</code>
    </section>

    <section id="code">
        <h2>Din kod</h2>
        <form id="dataForm">
            <label>Ladda upp fil
                <input type="file" accept=".py">
            </label>

            <div>
                <textarea id="inputData" name="inputData" required spellcheck="false" oninput="update(); sync_scroll(this);" onscroll="sync_scroll(this);" onkeydown="check_tab(this, event);"></textarea>
                <pre id="highlighting" aria-hidden="true">
<code class="language-python" id="highlighting-content">b = [10, True, None, 1 &amp; 2]
a = b
{ "hej": "hej" }
def hej(ehehe):
	print(ehehe)
</code>
</pre>
            </div>
            <button type="submit" class="btn btn-primary">Skicka</button>
        </form>
    </section>

    <script>
        const dataFormElem = document.querySelector('#dataForm');
        const inputDataElem = document.querySelector('#inputData');
        const highlightingElem = document.querySelector('#highlighting');
        const highlightingContentElem = document.querySelector('#highlighting-content');

        dataFormElem.addEventListener('submit', function (event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            fetch('/api/submit_code', {
                method: 'POST',
                body: formData
            });
        });

        // https://css-tricks.com/creating-an-editable-textarea-that-supports-syntax-highlighted-code/
        function update() {
            const result_element = highlightingContentElem;
            let text = inputDataElem.value;
            // Handle final newlines (see article)
            if(text[text.length-1] == "\n") {
                text += " ";
            }
            // Update code
            result_element.innerHTML = text.replace(new RegExp("&", "g"), "&amp;").replace(new RegExp("<", "g"), "&lt;"); /* Global RegExp */
            // Syntax Highlight
            Prism.highlightElement(result_element);
        }

        function sync_scroll(element) {
            /* Scroll result to scroll coords of event - sync with textarea */
            const result_element = highlightingElem;
            // Get and set x and y
            result_element.scrollTop = element.scrollTop;
            result_element.scrollLeft = element.scrollLeft;
        }

        function check_tab(elem, event) {
            const code = elem.value;
            if(event.key == "Tab") {
                /* Tab key pressed */
                event.preventDefault(); // stop normal
                const before_tab = code.slice(0, elem.selectionStart); // text before tab
                const after_tab = code.slice(elem.selectionEnd, elem.value.length); // text after tab
                const cursor_pos = elem.selectionStart + 1; // where cursor moves after tab - moving forward by 1 char to after tab
                elem.value = before_tab + "\t" + after_tab; // add tab char
                // move cursor
                elem.selectionStart = cursor_pos;
                elem.selectionEnd = cursor_pos;
            }
        }

        dataFormElem.querySelector('input[type=file]').addEventListener('change', changeEvent => {
            if(!confirm('Vill du byta ut all kod skriven här mot koden i den uppladdade filen?')) {
                return;
            }

            const file = changeEvent.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.readAsText(file);

                reader.onload = async function (loadEvent) {
                    console.log('load', loadEvent);
                    inputDataElem.value = loadEvent.target.result;
                    update();
                }
                reader.onerror = function (errorEvent) {
                    console.error(errorEvent);
                }
            }
        });

        if(inputDataElem.value.length === 0 && highlightingContentElem.textContent.length > 0) {
            const text = highlightingContentElem.textContent;
            inputDataElem.value = text;
        }
        update();
    </script>
</body>
</html>
