name: Delad choklad
type: pass-fail
description: Du vill ge choklad till dina vänner, men du vill inte att det blir orättvist så du ska dela ut chokladbitarna så att alla får lika många och sedan äter du resten. Du ska nu räkna ut hur mycket godis du får! Indata är två rader där första raden innehåller ett heltal som är choklad ni får och andra raden innehåller ett heltal som är mängden vänner du har. Skriv ut hur mycket godis du får.
source: Programmeringsläger för Nybörjare 2025
author: Jackryd
