<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data['name'] }} - {{ competitionName }}</title>
    <style>
        @import url({{ url_for('static', filename='toolstyle.css') }}) layer(toolstyle);

        :root {
            --background-color-success: green;
        }

        @media(prefers-color-scheme: dark) {
            :root {
                --background-color-success: darkgreen;
            }
        }

        form > div {
            height: 50vh;
            margin-top: 0.5em;
        }

        h2 {
            margin-bottom: 0;
        }

        p.text {
            white-space: pre-wrap;
        }

        button {
            padding: 0.5em 1em;
        }

        dialog {
            background-color: var(--background-color);
            color: var(--on-background-color);
            border: 0.1em solid var(--on-background-color);
            border-radius: 0.5em;
        }
        dialog#dialog-fail {
            background-color: var(--background-color-warning);
        }
        dialog#dialog-success {
            background-color: var(--background-color-success);
        }
        dialog::backdrop {
            background-color: #0008;
        }
    </style>
</head>
<body>
    <h1>{{ data['name'] }}</h1>
    <a href="/" onclick="document.cookie = `team=;path=/;max-age=0`">Lag {{ team }} - Logga ut</a>
    <p class="text">{{ data['description'] }}</p>
    <div class="container">
        <h2>Svar</h2>
        <form id="dataForm">
            <input type="text" id="inputData" name="inputData" required spellcheck="false">
            <button type="submit" class="btn btn-primary">Skicka</button>
        </form>
    </div>

    <dialog id="dialog-waiting">
        <h2>Väntar på svar...</h2>
        <p>Ditt svar har skickats in. Svar borde komma inom några sekunder...</p>
    </dialog>
    <dialog id="dialog-fail">
        <h2>Fel svar</h2>
        <button class="close">Stäng</button>
    </dialog>
    <dialog id="dialog-success">
        <h2>Rätt svar</h2>
        <p>
            <code>Rum: <span></span></code>
        </p>
        <button class="close">Stäng</button>
    </dialog>

    <script>
        const dataFormElem = document.querySelector('#dataForm');

        const dialogWaiting = document.querySelector('#dialog-waiting');
        const dialogFail = document.querySelector('#dialog-fail');
        const dialogSuccess = document.querySelector('#dialog-success');

        dataFormElem.addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            dialogWaiting.showModal();

            await fetch('/api/submit_code{% if problemOverride %}?problem={{ problem }}{% endif %}', {
                method: 'POST',
                body: formData
            }).then(async response => {
                dialogWaiting.close();
                if(!response.ok) {
                    console.error(response);
                    alert('Ett fel uppstod när koden skickades in');
                    return;
                }
                const result = await response.json();

                if(result.hasOwnProperty('room')) {
                    dialogSuccess.querySelector('code span').textContent = result.room;
                    dialogSuccess.showModal();
                } else {
                    dialogFail.showModal();
                }
            }).catch(async error => {
                console.error(error);
            });
        });

        document.querySelectorAll('dialog button.close').forEach(button => {
            button.addEventListener('click', event => {
                event.target.closest('dialog').close();
            });
        });
    </script>
</body>
</html>
